cpf.addEventListener('input',e=>{
 let v=e.target.value.replace(/\D/g,'');
 v=v.replace(/(\d{3})(\d)/,'$1.$2');
 v=v.replace(/(\d{3})(\d)/,'$1.$2');
 v=v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
 e.target.value=v;
});

function setup(id,pid,arr){
 document.getElementById(id).addEventListener('change',function(){
 arr.push(...Array.from(this.files));
 render(arr,pid);
 this.value='';
 });
}

function render(arr,pid){
 const p=document.getElementById(pid); p.innerHTML='';
 arr.forEach((file,i)=>{
  const r=new FileReader();
  r.onload=e=>{
   const d=document.createElement('div');
   d.className='preview-item';
   d.innerHTML='<img src="'+e.target.result+'">';
   const b=document.createElement('button');
   b.type='button'; b.className='btn-remover'; b.innerHTML='✖';
   b.onclick=()=>{arr.splice(i,1);render(arr,pid);};
   d.appendChild(b); p.appendChild(d);
  };
  r.readAsDataURL(file);
 });
}

setup('qualificacoesFotos','previewQualificacoes',q);
setup('formacaoFotos','previewFormacao',f);

function b64(file){return new Promise(r=>{let fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(file);});}

formColaborador.addEventListener('submit', async e => {

    e.preventDefault();

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    let y = 20;

    function verificarQuebra(espacoNecessario = 20){
        if(y + espacoNecessario > 280){
            pdf.addPage();
            y = 20;
        }
    }

    function adicionarTitulo(texto){
        verificarQuebra(20);

        pdf.setFontSize(16);
        pdf.setFont(undefined, 'bold');
        pdf.text(texto, 105, y, { align: 'center' });

        y += 8;

        pdf.setDrawColor(180,180,180);
        pdf.line(20, y, 190, y);

        y += 10;

        pdf.setFont(undefined, 'normal');
    }

    // CABEÇALHO

    adicionarTitulo("CADASTRO DE COLABORADOR");

    pdf.setFontSize(11);

    pdf.text("Nome:", 20, y);
    pdf.text(nomeCompleto.value, 55, y);
    y += 8;

    pdf.text("Matrícula:", 20, y);
    pdf.text(matricula.value, 55, y);
    y += 8;

    pdf.text("CPF:", 20, y);
    pdf.text(cpf.value, 55, y);
    y += 15;

    // QUALIFICAÇÕES

    adicionarTitulo("QUALIFICAÇÕES");

    pdf.setFontSize(11);

    const qualificacoesLinhas =
        pdf.splitTextToSize(
            qualificacoesTexto.value,
            170
        );

    pdf.text(qualificacoesLinhas, 20, y);

    y += (qualificacoesLinhas.length * 6) + 10;

    pdf.setFont(undefined, 'bold');
    pdf.text("Comprovantes das Qualificações:", 20, y);
    pdf.setFont(undefined, 'normal');

    y += 10;

    let coluna = 0;
    let posX = 20;

    for(const arquivo of q){

        verificarQuebra(60);

        const img = await b64(arquivo);

        pdf.addImage(
            img,
            'JPEG',
            posX,
            y,
            75,

        );

        coluna++;

        if(coluna === 2){
            coluna = 0;

        }
    }

    if(coluna !== 0){

    // FORMAÇÃO

            img,
            'JPEG',
            posX,
            y,
            75,
            55
        );

        coluna++;

        if(coluna === 2){
            coluna = 0;
            posX = 20;
            y += 65;
        } else {
            posX = 110;
        }
    }

    if(coluna !== 0){
        y += 65;
    }

    // RODAPÉ

    verificarQuebra(20);

    pdf.setDrawColor(180,180,180);
    pdf.line(20, y, 190, y);

    y += 10;

    pdf.setFontSize(10);
